<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Darts</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="content-page">
  <header class="site-header">
    <a class="site-brand" href="./">Darts</a>
  </header>

  <main class="content-shell">
    <a class="back-link" href="./">&larr; Back to Darts</a>
    <section class="content-card">
      <p class="section-label">Account recovery</p>
      <h1>Choose a new password</h1>
      <p>Open this page from the link in your password-reset email, then enter a new password.</p>
      <p class="auth-message" id="reset-message" role="status" aria-live="polite"></p>

      <form id="reset-password-form">
        <div class="form-field">
          <label for="new-password">New password</label>
          <input id="new-password" type="password" minlength="8" autocomplete="new-password" required>
        </div>
        <div class="form-field">
          <label for="confirm-password">Confirm new password</label>
          <input id="confirm-password" type="password" minlength="8" autocomplete="new-password" required>
        </div>
        <button class="primary-button" id="reset-submit" type="submit" disabled>Update password</button>
      </form>
    </section>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.2"></script>
  <script defer src="supabase-config.js"></script>
  <script defer src="supabase-client.js"></script>
  <script defer src="reset-password.js"></script>
</body>
</html>
