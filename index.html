<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darts Scoring</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">
  <main class="home-shell">
    <p class="home-eyebrow">Darts scoring</p>
    <h1>Darts</h1>
    <p class="home-intro">Pick a game mode to start keeping score.</p>

    <nav class="mode-grid" aria-label="Game modes">
      <a class="mode-card" href="cricket/">
        <span>
          <span class="mode-title">Cricket</span>
          <span class="mode-detail">20, 19, 18, 17, 16, 15, Bull</span>
        </span>
        <span class="mode-arrow" aria-hidden="true">&rarr;</span>
      </a>
      <a class="mode-card" href="cricket_legacy/">
        <span>
          <span class="mode-title">Cricket Legacy</span>
          <span class="mode-detail">Stable original scoreboard</span>
        </span>
        <span class="mode-arrow" aria-hidden="true">&rarr;</span>
      </a>
    </nav>
  </main>
</body>
</html>
